<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img\tanishq_logo_browser_top.png">
    <title>Login</title>
    <link rel="stylesheet" href="styles\login.css">

<body>
    <div id="container">
        <div class="logo">
            <img src="https://www.tanishq.co.in/wps/wcm/connect/tanishq/4417c959-3482-4f71-942a-a12e015997b6/tanishq.svg?MOD=AJPERES&ampCACHEID=ROOTWORKSPACE.Z18_90IA1H80O0RT10QIMVSTFU3006-4417c959-3482-4f71-942a-a12e015997b6-nv8w2CB" alt="">

        </div>

        <div class="main">
            <div>
                <fieldset id="tag">
                    <legend>LOGIN WITH PASSWORD</legend>
                        <h6>LOGIN USING NUMBER & OTP</h6>
                    <form>

                        <input type="email" id="user" placeholder="ENTER E-MAIL">
                        <input type="password" id="pass" placeholder="ENTER PASSWORD">
                        <button type="submit" id="login" >Login</button>

                     </form>
                </fieldset>

            </div>
            <div style="width: 0.01em;background-color: black;"></div>
            <div>
                <img class="signup" src="img\s.png" alt="">
            </div>
        </div>
    </div>
</body>
</html>

<script src="scripts\backendApi.js"></script>
<script>

   let sign = document.querySelector(".signup")
   sign.addEventListener("click", function(){
       window.location.href="signup.html";
   })


document.querySelector("form").addEventListener("submit", login);
async function login(event){ 
event.preventDefault();
var user = document.querySelector("#user").value.trim();
var pass = document.querySelector("#pass").value;

if(!user){
    alert("Please fill username");
    return;
}
if(!pass){
    alert("Please fill password");
    return;
}

try {
    await window.BackendApi.login(user, pass);
    await window.BackendApi.syncLegacyCartFromBackend();
    alert("login successfully");
    window.BackendApi.hydrateNavbar();
    window.location.href="index.html";
} catch (err) {
    alert(err && err.message ? err.message : "Invalid Username or Password");
}
}
</script>
